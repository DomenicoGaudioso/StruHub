<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1d5f8f"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#b93c2f"/>
    </marker>
    <marker id="arrow-dark" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2d3748"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1f2933; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 20px; font-weight: 700; }
      .label { font-size: 18px; }
      .small { font-size: 16px; }
      .tiny { font-size: 15px; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .water { fill: #d9eef9; }
      .waterline { stroke: #3c8dbc; stroke-width: 3; }
      .pier { fill: #d6d3d1; stroke: #57534e; stroke-width: 3; }
      .foundation { fill: #c7c2bc; stroke: #57534e; stroke-width: 3; }
      .guide { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; }
      .force-red { stroke: #b93c2f; stroke-width: 5; fill: none; marker-end: url(#arrow-red); }
      .force-blue { stroke: #1d5f8f; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); }
      .force-dark { stroke: #2d3748; stroke-width: 4; fill: none; marker-end: url(#arrow-dark); }
    </style>
  </defs>

  <rect x="20" y="20" width="1160" height="720" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="60" y="70" class="title">Spinta idraulica su una pila da ponte</text>

  <rect x="55" y="105" width="445" height="590" rx="18" class="box"/>
  <text x="80" y="145" class="subtitle">1. Geometria in pianta</text>

  <path d="M145 300 L245 230 L395 230 L445 300 L395 370 L245 370 Z" fill="#e7e5e4" stroke="#57534e" stroke-width="4"/>
  <line x1="70" y1="300" x2="125" y2="300" class="force-blue"/>
  <text x="75" y="275" class="label">Flusso</text>
  <text x="77" y="297" class="label">V</text>

  <line x1="145" y1="410" x2="445" y2="410" class="guide"/>
  <line x1="145" y1="410" x2="145" y2="436" stroke="#475569" stroke-width="3"/>
  <line x1="445" y1="410" x2="445" y2="436" stroke="#475569" stroke-width="3"/>
  <text x="248" y="445" class="label">asse maggiore l</text>

  <line x1="300" y1="230" x2="300" y2="370" class="guide"/>
  <line x1="505" y1="250" x2="505" y2="350" stroke="#475569" stroke-width="3"/>
  <line x1="485" y1="250" x2="525" y2="250" stroke="#475569" stroke-width="3"/>
  <line x1="485" y1="350" x2="525" y2="350" stroke="#475569" stroke-width="3"/>
  <text x="535" y="307" class="label">b</text>

  <path d="M300 300 L370 265" stroke="#0f766e" stroke-width="4" fill="none"/>
  <path d="M345 300 A45 45 0 0 1 370 265" stroke="#0f766e" stroke-width="3" fill="none"/>
  <text x="350" y="292" class="label" fill="#0f766e">a</text>

  <text x="80" y="505" class="label">Larghezza proiettata normale al flusso</text>
  <text x="80" y="540" class="label">b_perp = b cos(a) + l sin(a)</text>
  <text x="80" y="585" class="label">Area investita</text>
  <text x="80" y="620" class="label">A_p = b_perp h</text>
  <text x="80" y="665" class="small">La stessa pila cambia area proiettata se cambia lo skew</text>

  <rect x="540" y="105" width="605" height="590" rx="18" class="box"/>
  <text x="565" y="145" class="subtitle">2. Azioni in elevazione</text>

  <rect x="595" y="255" width="470" height="255" class="water"/>
  <line x1="595" y1="255" x2="1065" y2="255" class="waterline"/>
  <line x1="595" y1="290" x2="1065" y2="290" class="waterline" stroke-dasharray="10 10"/>

  <rect x="800" y="195" width="110" height="355" class="pier"/>
  <rect x="760" y="510" width="190" height="58" class="foundation"/>

  <polygon points="690,510 800,510 800,290" fill="#fce7e7" stroke="#b93c2f" stroke-width="3" opacity="0.9"/>

  <g stroke="#b93c2f" stroke-width="2">
    <line x1="700" y1="485" x2="798" y2="485"/>
    <line x1="712" y1="455" x2="798" y2="455"/>
    <line x1="724" y1="425" x2="798" y2="425"/>
    <line x1="736" y1="395" x2="798" y2="395"/>
    <line x1="748" y1="365" x2="798" y2="365"/>
    <line x1="760" y1="335" x2="798" y2="335"/>
    <line x1="772" y1="305" x2="798" y2="305"/>
  </g>

  <line x1="910" y1="325" x2="1010" y2="325" class="force-red"/>
  <line x1="910" y1="410" x2="1010" y2="410" class="force-red"/>
  <line x1="910" y1="495" x2="1010" y2="495" class="force-red"/>

  <line x1="610" y1="420" x2="705" y2="420" class="force-blue"/>
  <text x="620" y="395" class="label">V</text>
  <text x="608" y="452" class="tiny">corrente</text>

  <line x1="1085" y1="255" x2="1118" y2="255" stroke="#475569" stroke-width="3"/>
  <line x1="1085" y1="290" x2="1118" y2="290" stroke="#475569" stroke-width="3"/>
  <line x1="1110" y1="255" x2="1110" y2="290" stroke="#475569" stroke-width="3"/>
  <text x="1125" y="278" class="label">delta h</text>

  <line x1="570" y1="255" x2="570" y2="510" stroke="#475569" stroke-width="3"/>
  <line x1="550" y1="255" x2="590" y2="255" stroke="#475569" stroke-width="3"/>
  <line x1="550" y1="510" x2="590" y2="510" stroke="#475569" stroke-width="3"/>
  <text x="520" y="390" class="label">h</text>

  <circle cx="940" cy="405" r="7" fill="#111827"/>
  <line x1="940" y1="405" x2="1045" y2="405" class="force-dark"/>
  <text x="955" y="388" class="label">F_tot</text>

  <text x="585" y="600" class="label">F_D = 1/2 rho C_D A_p V^2</text>
  <text x="585" y="632" class="label">F_H = 1/2 gamma_w b (h_m^2 - h_v^2)</text>
  <text x="585" y="664" class="label">M_base = F_D z_D + F_H z_H</text>
</svg>
