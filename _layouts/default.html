<!doctype html>
<html lang="{{ site.lang | default: 'it' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  {% include mathjax.html %}
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}"><img src="{{ '/assets/logo.png' | relative_url }}" alt="StruHub"></a>
    <nav>
      <a href="{{ '/#articoli' | relative_url }}">Articoli</a>
      <a href="{{ '/about.html' | relative_url }}">Metodo</a>
    </nav>
  </header>
  <main>
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>StruHub raccoglie appunti tecnici, modelli di calcolo e riferimenti per l'ingegneria strutturale digitale.</p>
  </footer>
</body>
</html>
