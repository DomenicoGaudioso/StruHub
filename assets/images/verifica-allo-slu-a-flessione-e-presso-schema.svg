<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Schema di verifica allo SLU di una sezione in calcestruzzo armato</title>
  <desc id="desc">Schema tecnico con sezione rettangolare 300x500 mm, armature superiori e inferiori, asse neutro, diagramma delle deformazioni e blocco equivalente di compressione per verifica a flessione e presso-flessione.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f3b5f"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#b33a2b"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <style>
      .bg { fill: #f6f4ef; }
      .panel { fill: #ffffff; stroke: #d4d0c8; stroke-width: 2; }
      .section { fill: #e8efe8; stroke: #46604b; stroke-width: 4; }
      .cover { fill: #f8fbf8; stroke: #8aa18f; stroke-width: 2; stroke-dasharray: 8 6; }
      .bar { fill: #405466; stroke: #21313c; stroke-width: 2; }
      .axis { stroke: #6b7a86; stroke-width: 2.5; stroke-dasharray: 10 8; }
      .neutral { stroke: #b33a2b; stroke-width: 4; stroke-dasharray: 14 10; }
      .strain { stroke: #0f3b5f; stroke-width: 4; fill: none; }
      .stress { fill: #f0d4c9; stroke: #b33a2b; stroke-width: 3; }
      .force { stroke: #b33a2b; stroke-width: 5; fill: none; marker-end: url(#arrow-red); }
      .moment { stroke: #0f3b5f; stroke-width: 5; fill: none; marker-end: url(#arrow-blue); }
      .dim { stroke: #666; stroke-width: 2.5; fill: none; marker-start: url(#arrow-gray); marker-end: url(#arrow-gray); }
      .guide { stroke: #999; stroke-width: 2; stroke-dasharray: 6 6; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 30px; fill: #23313b; }
      .small { font-family: 'Segoe UI', Arial, sans-serif; font-size: 24px; fill: #23313b; }
      .tiny { font-family: 'Segoe UI', Arial, sans-serif; font-size: 21px; fill: #23313b; }
      .note { fill: #0f3b5f; font-weight: 600; }
      .accent { fill: #b33a2b; font-weight: 600; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="860" />

  <text class="label" x="70" y="68">Verifica allo SLU di una sezione rettangolare in c.a.</text>
  <text class="tiny" x="70" y="102">Schema di lettura utile sia per flessione semplice sia per presso-flessione retta</text>

  <rect class="panel" x="60" y="130" width="420" height="650" rx="14" />
  <rect class="panel" x="510" y="130" width="280" height="650" rx="14" />
  <rect class="panel" x="820" y="130" width="400" height="650" rx="14" />

  <text class="small note" x="92" y="176">Sezione 300 x 500 mm</text>
  <text class="small note" x="545" y="176">Diagramma delle deformazioni</text>
  <text class="small note" x="856" y="176">Blocco equivalente e forze interne</text>

  <rect class="section" x="140" y="220" width="260" height="430" />
  <rect class="cover" x="180" y="260" width="180" height="350" />

  <line class="axis" x1="270" y1="205" x2="270" y2="670" />
  <line class="axis" x1="120" y1="435" x2="420" y2="435" />
  <text class="small" x="427" y="442">y</text>
  <text class="small" x="278" y="204">x</text>

  <g>
    <circle class="bar" cx="205" cy="278" r="14" />
    <circle class="bar" cx="265" cy="278" r="14" />
    <circle class="bar" cx="325" cy="278" r="14" />
    <circle class="bar" cx="385" cy="278" r="14" />
    <circle class="bar" cx="205" cy="592" r="14" />
    <circle class="bar" cx="265" cy="592" r="14" />
    <circle class="bar" cx="325" cy="592" r="14" />
    <circle class="bar" cx="385" cy="592" r="14" />
  </g>

  <line class="neutral" x1="140" y1="368" x2="400" y2="368" />
  <text class="small accent" x="152" y="355">asse neutro x</text>

  <line class="dim" x1="108" y1="220" x2="108" y2="650" />
  <line class="guide" x1="118" y1="220" x2="140" y2="220" />
  <line class="guide" x1="118" y1="650" x2="140" y2="650" />
  <text class="small" x="78" y="450" transform="rotate(-90 78 450)">h = 500 mm</text>

  <line class="dim" x1="140" y1="700" x2="400" y2="700" />
  <line class="guide" x1="140" y1="660" x2="140" y2="716" />
  <line class="guide" x1="400" y1="660" x2="400" y2="716" />
  <text class="small" x="214" y="690">b = 300 mm</text>

  <line class="dim" x1="435" y1="220" x2="435" y2="278" />
  <line class="guide" x1="400" y1="220" x2="452" y2="220" />
  <line class="guide" x1="400" y1="278" x2="452" y2="278" />
  <text class="small" x="454" y="260">d' = 58 mm</text>

  <line class="dim" x1="435" y1="220" x2="435" y2="592" />
  <line class="guide" x1="400" y1="592" x2="452" y2="592" />
  <text class="small" x="454" y="430">d = 442 mm</text>

  <text class="tiny" x="180" y="752">Armature esempio: 4 phi20 sopra + 4 phi20 sotto</text>

  <line class="strain" x1="730" y1="240" x2="560" y2="368" />
  <line class="strain" x1="560" y1="368" x2="720" y2="650" />
  <line class="axis" x1="560" y1="220" x2="560" y2="650" />
  <line class="axis" x1="560" y1="368" x2="742" y2="368" />
  <line class="neutral" x1="530" y1="368" x2="760" y2="368" />

  <text class="small accent" x="566" y="356">x</text>
  <text class="small" x="652" y="246">eps_cu</text>
  <text class="small" x="672" y="638">eps_s</text>
  <text class="tiny" x="546" y="694">Compatibilita': sezioni piane restano piane</text>
  <text class="tiny" x="546" y="726">Controllo pratico: verificare che l'acciaio teso sia in campo attivo</text>

  <rect class="stress" x="870" y="220" width="190" height="148" />
  <text class="small accent" x="888" y="298">0.8 x</text>
  <text class="small accent" x="888" y="334">sigma_c = f_cd</text>
  <line class="neutral" x1="850" y1="368" x2="1180" y2="368" />

  <path class="force" d="M965 388 L965 510" />
  <text class="small accent" x="982" y="458">C_c</text>
  <path class="force" d="M1145 278 L1145 388" />
  <text class="small accent" x="1102" y="260">C_s</text>
  <path class="moment" d="M1000 642 C1080 590, 1135 560, 1178 606" />
  <text class="small note" x="1018" y="666">M_Rd</text>

  <path class="moment" d="M905 604 L905 500" />
  <text class="small note" x="876" y="634">T_s</text>

  <line class="guide" x1="965" y1="368" x2="965" y2="510" />
  <line class="guide" x1="1145" y1="220" x2="1145" y2="388" />
  <line class="guide" x1="905" y1="500" x2="905" y2="650" />

  <text class="tiny" x="848" y="550">Equilibrio:</text>
  <text class="tiny" x="848" y="582">N_Rd = C_c + C_s - T_s</text>
  <text class="tiny" x="848" y="614">M_Rd = sum(F_i z_i)</text>
  <text class="tiny" x="848" y="716">Leva interna e asse neutro devono restare leggibili</text>
  <text class="tiny" x="848" y="748">anche quando la verifica passa da M a N-M.</text>
</svg>
